name: Lynch Analysis (Email)

# GitHub Actions 的 cron 一律使用 UTC。
#   Daily 日报: '0 21 * * 1-5' = UTC 周一~周五 21:00（美股当日收盘后）
#                              = 日本时间(JST) 周二~周六 06:00  ← 覆盖「周二至周六」
#   Weekly 周报: '0 3 * * 6'   = UTC 周六 03:00（美股周五收盘后）
#                              = 日本时间(JST) 周六 12:00
# 通过 github.event.schedule 判断本次由哪条 cron 触发，从而选择 daily / weekly 模式。
on:
  schedule:
    - cron: "0 21 * * 1-5"
    - cron: "0 3 * * 6"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式 (daily / weekly)"
        required: false
        default: "daily"
      market:
        description: "扫描市场 (ALL / JP / US)"
        required: false
        default: "ALL"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve run mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 3 * * 6" ]; then
            echo "value=weekly" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Lynch pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python scripts/run_scheduled_analysis.py \
            --mode "${{ steps.mode.outputs.value }}" \
            --market "${{ github.event.inputs.market || 'ALL' }}"
