name: Lynch Analysis (Email)

# ── 立体化投研周期：四种静默节奏，坚决拒绝任何盘中实时告警/高频轮询 ──
# GitHub Actions 的 cron 一律使用 UTC。
#   Daily 日报:     '0 21 * * 1-5' = UTC 周一~周五 21:00（美股当日收盘后）= JST 周二~周六 06:00
#   Weekly 周报:    '0 3 * * 6'    = UTC 周六 03:00（美股周五收盘后）     = JST 周六 12:00
#   Quarterly 季报: '0 5 31 1,7,10 *' + '0 5 30 4 *' = 1/4/7/10 月最后一天（Gemini 财报季会诊）
#   Annual 年报:    '0 5 31 12 *'  = 12/31 年终持仓审视（Gemini 剔除自选股池）
#   Monthly 月报:  '0 21 28-31 * *' = 每月 28-31 日 UTC 21:00（脚本内校验是否当月最后交易日）
# 通过 github.event.schedule 判断由哪条 cron 触发，选择 daily / weekly / monthly / quarterly / annual。
on:
  schedule:
    - cron: "0 21 * * 1-5"
    - cron: "0 3 * * 6"
    - cron: "0 21 28-31 * *"
    - cron: "0 5 31 1,7,10 *"
    - cron: "0 5 30 4 *"
    - cron: "0 5 31 12 *"
  workflow_dispatch:
    inputs:
      mode:
        description: "运行模式 (daily / weekly / monthly / quarterly / annual)"
        required: false
        default: "daily"
      scope:
        description: "范围 (watchlist / full 全市场双层漏斗)"
        required: false
        default: "full"
      market:
        description: "市场 (ALL / JP / US)"
        required: false
        default: "ALL"

jobs:
  analyze:
    runs-on: ubuntu-latest
    # 全量 us_sbi（约 3500+ 只）粗筛 + FMP 节流后可能超过半小时
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute FMP cache week id
        id: fmp_week
        run: |
          mkdir -p data/cache/fmp
          echo "value=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      # restore+save 分离：每周内每次 run 都能把新增静态缓存写回，供同周后续复用
      - name: Restore FMP static cache
        uses: actions/cache/restore@v4
        id: fmp_cache
        with:
          path: data/cache/fmp
          key: fmp-cache-${{ runner.os }}-${{ steps.fmp_week.outputs.value }}-${{ github.run_id }}
          restore-keys: |
            fmp-cache-${{ runner.os }}-${{ steps.fmp_week.outputs.value }}-
            fmp-cache-${{ runner.os }}-

      - name: Resolve run mode
        id: mode
        run: |
          case "${{ github.event.schedule }}" in
            "0 3 * * 6")                    mode=weekly ;;
            "0 5 31 12 *")                  mode=annual ;;
            "0 5 31 1,7,10 *"|"0 5 30 4 *") mode=quarterly ;;
            "0 21 28-31 * *")               mode=monthly ;;
            "0 21 * * 1-5")                 mode=daily ;;
            *)                              mode="${{ github.event.inputs.mode }}"; mode="${mode:-daily}" ;;
          esac
          mode="${mode,,}"
          echo "value=$mode" >> "$GITHUB_OUTPUT"

      - name: Run Lynch pipeline
        env:
          # 数据源 / 漏斗 / 成本熔断
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER }}
          # 注意：若仓库 Variables 已设 UNIVERSE_SOURCES / SCAN_WORKERS，会覆盖下方 fallback。
          # 周报美股建议 Variables：UNIVERSE_SOURCES=us_sbi，MAX_UNIVERSE_SCAN=0，SCAN_WORKERS=2
          UNIVERSE_SOURCES: ${{ vars.UNIVERSE_SOURCES || 'us_sbi' }}
          MARKET: ${{ vars.MARKET || 'US' }}
          US_MARKET_SAMPLE_SIZE: ${{ vars.US_MARKET_SAMPLE_SIZE }}
          MAX_UNIVERSE_SCAN: ${{ vars.MAX_UNIVERSE_SCAN || '0' }}
          MAX_AI_ANALYSIS_COUNT: ${{ vars.MAX_AI_ANALYSIS_COUNT || '30' }}
          LAYER3_FLASH_TOP_N: ${{ vars.LAYER3_FLASH_TOP_N || '10' }}
          AI_SORT_KEY: ${{ vars.AI_SORT_KEY }}
          SCAN_WORKERS: ${{ vars.SCAN_WORKERS || '2' }}
          SBI_UNIVERSE_MIN_MARKET_CAP: ${{ vars.SBI_UNIVERSE_MIN_MARKET_CAP || '300000000' }}
          SBI_UNIVERSE_LIMIT: ${{ vars.SBI_UNIVERSE_LIMIT || '10000' }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_DAILY_QUOTA: "0"
          FMP_REQUEST_INTERVAL: ${{ vars.FMP_REQUEST_INTERVAL || '0.4' }}
          # 双 Key 物理分流：Flash / Pro 各用独立免费项目；未设则 fallback GEMINI_API_KEY
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_FLASH_API_KEY: ${{ secrets.GEMINI_FLASH_API_KEY }}
          GEMINI_PRO_API_KEY: ${{ secrets.GEMINI_PRO_API_KEY }}
          # 模型名用 Variables（勿放 Secrets）；新免费项目不可用 2.5-*
          GEMINI_FLASH_MODEL: ${{ vars.GEMINI_FLASH_MODEL || 'gemini-3.5-flash' }}
          GEMINI_PRO_MODEL: ${{ vars.GEMINI_PRO_MODEL || 'gemini-3.5-flash' }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}
          GEMINI_FLASH_INTERVAL_SEC: ${{ vars.GEMINI_FLASH_INTERVAL_SEC || '13' }}
          GEMINI_PRO_INTERVAL_SEC: ${{ vars.GEMINI_PRO_INTERVAL_SEC || '32' }}
          GEMINI_FORCE_FLASH_DEEP: ${{ vars.GEMINI_FORCE_FLASH_DEEP || '1' }}
          # 邮件 SMTP
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: |
          python scripts/run_scheduled_analysis.py \
            --mode "${{ steps.mode.outputs.value }}" \
            --scope "${{ github.event.inputs.scope || 'full' }}" \
            --market "${{ github.event.inputs.market || vars.MARKET || 'US' }}"

      - name: Save FMP static cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: data/cache/fmp
          key: fmp-cache-${{ runner.os }}-${{ steps.fmp_week.outputs.value }}-${{ github.run_id }}
