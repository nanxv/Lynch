name: Lynch Realtime Sniper

# 美股盘中实时狙击（独立于日报/周报）
# JST 周二~周六 23:00–次日 04:30 ≈ UTC 周二~周六 14:00–19:30（每 30 分钟）
# GitHub cron: 分 0,30 · 时 14-19 · 星期 2-6（UTC）
on:
  schedule:
    - cron: "0,30 14-19 * * 2-6"
  workflow_dispatch:

jobs:
  sniper:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute FMP cache week id
        id: fmp_week
        run: |
          mkdir -p data/cache/fmp
          echo "value=$(date -u +%G-W%V)" >> "$GITHUB_OUTPUT"

      - name: Restore FMP static cache
        uses: actions/cache/restore@v4
        with:
          path: data/cache/fmp
          key: fmp-cache-${{ runner.os }}-${{ steps.fmp_week.outputs.value }}-${{ github.run_id }}
          restore-keys: |
            fmp-cache-${{ runner.os }}-${{ steps.fmp_week.outputs.value }}-
            fmp-cache-${{ runner.os }}-

      - name: Run realtime sniper
        env:
          DATA_PROVIDER: ${{ vars.DATA_PROVIDER }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FMP_DAILY_QUOTA: "0"
          FMP_REQUEST_INTERVAL: ${{ vars.FMP_REQUEST_INTERVAL || '0.4' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_FLASH_API_KEY: ${{ secrets.GEMINI_FLASH_API_KEY }}
          GEMINI_PRO_API_KEY: ${{ secrets.GEMINI_PRO_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: python scripts/run_realtime_sniper.py

      - name: Save FMP static cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: data/cache/fmp
          key: fmp-cache-${{ runner.os }}-${{ steps.fmp_week.outputs.value }}-${{ github.run_id }}
